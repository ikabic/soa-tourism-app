services:
  stakeholders-app:
    build:
      context: .
      dockerfile: ./stakeholders-service/Dockerfile
    container_name: stakeholders-app
    networks:
      - servers
    environment:
      DB_HOST: stakeholders-db
      DB_PORT: 5432
      DB_USER: ${STAKEHOLDERS_DB_USER:-postgres}
      DB_PASSWORD: ${STAKEHOLDERS_DB_PASSWORD:-postgres}
      DB_NAME: ${STAKEHOLDERS_DB_NAME:-stakeholders}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      FOLLOWERS_GRPC_ADDR: followers-app:50051
    depends_on:
      followers-app:
        condition: service_started
      stakeholders-db:
        condition: service_healthy
    volumes:
      - ./stakeholders-service/uploads:/app/stakeholders-service/uploads

  stakeholders-db:
    container_name: stakeholders-db
    image: postgres:16-alpine
    restart: always
    networks:
      - servers
    environment:
      POSTGRES_USER: ${STAKEHOLDERS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${STAKEHOLDERS_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${STAKEHOLDERS_DB_NAME:-stakeholders}
    ports:
      - "5433:5432"
    volumes:
      - stakeholders_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAKEHOLDERS_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  blog-app:
    build:
      context: .
      dockerfile: ./blog-service/Dockerfile
    container_name: blog-app
    networks:
      - servers
    environment:
      DB_HOST: blog-db
      DB_PORT: 5432
      DB_USER: ${BLOG_DB_USER:-postgres}
      DB_PASSWORD: ${BLOG_DB_PASSWORD:-postgres}
      DB_NAME: ${BLOG_DB_NAME:-blog}
      JWT_SECRET: ${JWT_SECRET}
      FOLLOWERS_GRPC_HOST: followers-app
      FOLLOWERS_GRPC_PORT: 50051
    depends_on:
      blog-db:
        condition: service_healthy
      followers-app:
        condition: service_started
    volumes:
      - ./blog-service/uploads:/app/uploads
  tour-app:
    build:
      context: .
      dockerfile: ./tour-service/Dockerfile
    container_name: tour-app
    networks:
      - servers
    environment:
      DB_HOST: tour-db
      DB_PORT: 5432
      DB_USER: ${TOUR_DB_USER:-postgres}
      DB_PASSWORD: ${TOUR_DB_PASSWORD:-postgres}
      DB_NAME: ${TOUR_DB_NAME:-tourdb}
      JWT_SECRET: ${JWT_SECRET}
      PURCHASE_SERVICE_URL: http://purchase-app:8083
      TOUR_SERVICE_GRPC_ADDR: tour-app:50051
      ASPNETCORE_URLS: http://+:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      tour-db:
        condition: service_healthy
      purchase-app:
        condition: service_started

  tour-db:
    container_name: tour-db
    image: postgres:16-alpine
    restart: always
    networks:
      - servers
    environment:
      POSTGRES_USER: ${TOUR_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TOUR_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${TOUR_DB_NAME:-tourdb}
    ports:
      - "5435:5432"
    volumes:
      - tour_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TOUR_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  purchase-app:
    build:
      context: .
      dockerfile: ./purchase-service/Dockerfile
    container_name: purchase-app
    networks:
      - servers
    environment:
      DB_HOST: purchase-db
      DB_PORT: 5432
      DB_USER: ${PURCHASE_DB_USER:-postgres}
      DB_PASSWORD: ${PURCHASE_DB_PASSWORD:-postgres}
      DB_NAME: ${PURCHASE_DB_NAME:-purchase}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      TOUR_SERVICE_URL: http://tour-app:8080
      TOUR_SERVICE_GRPC_ADDR: tour-app:50051
    depends_on:
      purchase-db:
        condition: service_healthy
    ports:
      - "8086:8083"

  purchase-db:
    container_name: purchase-db
    image: postgres:16-alpine
    restart: always
    networks:
      - servers
    environment:
      POSTGRES_USER: ${PURCHASE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PURCHASE_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${PURCHASE_DB_NAME:-purchase}
    ports:
      - "5436:5432"
    volumes:
      - purchase_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PURCHASE_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    image: nginx:stable-alpine
    container_name: api-gateway
    networks:
      - servers
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - blog-app
      - stakeholders-app
      - tour-app
      - followers-app

  blog-db:
    container_name: blog-db
    image: postgres:16-alpine
    restart: always
    networks:
      - servers
    environment:
      POSTGRES_USER: ${BLOG_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${BLOG_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${BLOG_DB_NAME:-blog}
    ports:
      - "5434:5432"
    volumes:
      - blog_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BLOG_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  followers-app:
    build:
      context: .
      dockerfile: ./followers-service/Dockerfile
    container_name: followers-app
    networks:
      - servers
    environment:
      NEO4J_URI: bolt://followers-db:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
      JWT_SECRET: ${JWT_SECRET}
      GRPC_PORT: 50051
    depends_on:
      followers-db:
        condition: service_healthy

  followers-db:
    container_name: followers-db
    image: neo4j:5-community
    restart: always
    networks:
      - servers
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - followers_neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - servers
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - servers
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    networks:
      - servers
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - servers
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    networks:
      - servers
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  stakeholders_pg_data:
  blog_pg_data:
  tour_pg_data:
  purchase_pg_data:
  followers_neo4j_data:
  grafana_data:

networks:
  servers:
    name: servers
    driver: bridge
