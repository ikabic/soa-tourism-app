services:
  stakeholders-app:
    build:
      context: .
      dockerfile: ./stakeholders-service/Dockerfile
    container_name: stakeholders-app
    networks:
      - servers
    environment:
      DB_HOST: stakeholders-db
      DB_PORT: 5432
      DB_USER: ${STAKEHOLDERS_DB_USER:-postgres}
      DB_PASSWORD: ${STAKEHOLDERS_DB_PASSWORD:-postgres}
      DB_NAME: ${STAKEHOLDERS_DB_NAME:-stakeholders}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      stakeholders-db:
        condition: service_healthy

  stakeholders-db:
    container_name: stakeholders-db
    image: postgres:16-alpine
    restart: always
    networks:
      - servers
    environment:
      POSTGRES_USER: ${STAKEHOLDERS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${STAKEHOLDERS_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${STAKEHOLDERS_DB_NAME:-stakeholders}
    ports:
      - "5433:5432"
    volumes:
      - stakeholders_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAKEHOLDERS_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  blog-app:
    build:
      context: ./blog-service
      dockerfile: Dockerfile
    container_name: blog-app
    networks:
      - servers
    environment:
      DB_HOST: blog-db
      DB_PORT: 5432
      DB_USER: ${BLOG_DB_USER:-postgres}
      DB_PASSWORD: ${BLOG_DB_PASSWORD:-postgres}
      DB_NAME: ${BLOG_DB_NAME:-blog}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      blog-db:
        condition: service_healthy

  tour-app:
    build:
      context: ./tour-service
      dockerfile: Dockerfile
    container_name: tour-app
    networks:
      - servers
    environment:
      DB_HOST: tour-db
      DB_PORT: 5432
      DB_USER: ${TOUR_DB_USER:-postgres}
      DB_PASSWORD: ${TOUR_DB_PASSWORD:-postgres}
      DB_NAME: ${TOUR_DB_NAME:-tourdb}
      JWT_SECRET: ${JWT_SECRET}
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      tour-db:
        condition: service_healthy

  tour-db:
    container_name: tour-db
    image: postgres:16-alpine
    restart: always
    networks:
      - servers
    environment:
      POSTGRES_USER: ${TOUR_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TOUR_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${TOUR_DB_NAME:-tourdb}
    ports:
      - "5435:5432"
    volumes:
      - tour_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TOUR_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    image: nginx:stable-alpine
    container_name: api-gateway
    networks:
      - servers
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - blog-app
      - stakeholders-app
      - tour-app
      - followers-app

  blog-db:
    container_name: blog-db
    image: postgres:16-alpine
    restart: always
    networks:
      - servers
    environment:
      POSTGRES_USER: ${BLOG_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${BLOG_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${BLOG_DB_NAME:-blog}
    ports:
      - "5434:5432"
    volumes:
      - blog_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BLOG_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  followers-app:
    build:
      context: .
      dockerfile: ./followers-service/Dockerfile
    container_name: followers-app
    networks:
      - servers
    environment:
      NEO4J_URI: bolt://followers-db:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
      JWT_SECRET: ${JWT_SECRET}
      STAKEHOLDERS_GRPC_ADDR: stakeholders-app:50051
    depends_on:
      followers-db:
        condition: service_healthy

  followers-db:
    container_name: followers-db
    image: neo4j:5-community
    restart: always
    networks:
      - servers
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - followers_neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  stakeholders_pg_data:
  blog_pg_data:
  tour_pg_data:
  followers_neo4j_data:

networks:
  servers:
    name: servers
    driver: bridge
